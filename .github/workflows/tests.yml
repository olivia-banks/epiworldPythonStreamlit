name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build dev container image
        run: docker build -f .devcontainer/Containerfile -t epiworld-dev .

      - name: Lint with ruff
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspaces/epiworldPythonStreamlit" \
            --user root \
            epiworld-dev \
            ruff check .

      - name: Run tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspaces/epiworldPythonStreamlit" \
            --user root \
            epiworld-dev \
            pytest tests/ -v
