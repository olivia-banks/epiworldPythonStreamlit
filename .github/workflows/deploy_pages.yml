name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image from Containerfile
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: false
          load: true
          tags: epicc:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build stlite bundle
        run: |
          docker run --rm --user root \
            -v "$PWD:/workspaces/${{ github.event.repository.name }}" \
            -w /workspaces/${{ github.event.repository.name }} \
            epicc:local \
            sh -c "uv sync --frozen && uv run scripts/build.py --app app.py --out dist"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
