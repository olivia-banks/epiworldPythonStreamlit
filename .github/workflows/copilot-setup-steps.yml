# Sets up the environment for the GitHub Copilot coding agent.
# The devcontainer Containerfile is the single source of truth for the
# project environment. The image is built locally on the runner from the
# checked-out Containerfile on every run, so it is always up to date and
# no container registry is required.
#
# Reference: https://docs.github.com/en/copilot/customizing-copilot/customizing-the-development-environment-for-copilot-coding-agent

name: "Copilot Setup Steps"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # The job MUST be named `copilot-setup-steps` for GitHub Copilot to use it.
  copilot-setup-steps:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Build the dev container image directly from the Containerfile on this
      # runner. No registry push is needed because the image is used locally.
      # Building on every run guarantees the image always reflects the current
      # state of the Containerfile.
      - name: Build dev container image from Containerfile
        run: docker build -t devcontainer -f .devcontainer/Containerfile .
